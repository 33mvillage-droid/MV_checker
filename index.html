    @keyframes flowerBounce {
      0%, 100% { transform: translateY(0px) scale(1); }

      60% { transform: translateY(-6px) scale(1.01); }
      80% { transform: translateY(-12px) scale(1.02); }

    @keyframes flowerGlow {

      50% { filter: drop-shadow(0 8px 24px rgba(201,168,76,0.55)); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-flower {
      animation: flowerBounce 1.6s ease-in-out infinite, flowerGlow 1.6s ease-in-out infinite;

    function generateReason(product, answers) {
      const concerns  = answers.concern   || [];
      const lifestyle = answers.lifestyle || [];

      const matchedLife = lifestyle.find(l => product.lifestyle.includes(l));
      if (matchedLife && LIFESTYLE_REASON[matchedLife]) {
        return LIFESTYLE_REASON[matchedLife];
      }

      const matchedConcern = concerns.find(c => product.concerns.includes(c));
      const prefix = matchedConcern ? (CONCERN_PREFIX[matchedConcern] || '') : '';
      return prefix + product.note;
    }

    function generateOverallMessage(answers) {
      const desires = answers.desire || [];
      const concerns = answers.concern || [];
      if (desires.length > 0) {
        const primaryDesire = desires[0];
        if (DESIRE_OUTCOME[primaryDesire]) {
          return `${DESIRE_OUTCOME[primaryDesire]}よう、サポートいたします。`;
        }
      }
      if (concerns.length > 0) {
        const primaryConcern = concerns[0];
        if (CONCERN_OUTCOME[primaryConcern]) {
          return `${CONCERN_OUTCOME[primaryConcern]}よう、整えてまいりましょう。`;
        }
      }
      return 'より豊かで調和に満ちた素晴らしい未来へ。';
    }

      const selectedStyles = answers.style || [];
      const selectedTarget = answers.target ? answers.target[0] : 'self';
      const selectedLifestyle = answers.lifestyle || [];

      let scoreList = PRODUCTS.map(p => {
        let score = 0;

          score += 15;
        }

        selectedConcerns.forEach(c => {
          if (p.concerns.includes(c)) score += 10;
        });

        selectedLifestyle.forEach(l => {
          if (p.lifestyle && p.lifestyle.includes(l)) score += 12;
        });

        selectedStyles.forEach(s => {
          if (SCENE_BOOST[s] && SCENE_BOOST[s].includes(p.id)) score += 8;
        });

        if (selectedTarget && TARGET_BOOST[selectedTarget] && TARGET_BOOST[selectedTarget].includes(p.id)) {
          score += 8;
        }

        score += p.priority * 1.5;

        const MULTI_WORLD_IDS = ['navi_rep_multi', 'sticker_multi', 'ballpen_multi'];
        if (MULTI_WORLD_IDS.includes(p.id) && selectedConcerns.length >= 2) {
          score += 20;

        return { id: p.id, score: score };
      });

      scoreList.sort((a, b) => b.score - a.score);

        return {
          id: p.id,
          reason: generateReason(p, answers),

            style="
              border-color: ${isSelected ? 'rgba(201,168,76,0.75)' : 'rgba(201,168,76,0.15)'};
              background: ${isSelected ? 'rgba(201,168,76,0.13)' : 'rgba(255,255,255,0.02)'};
              color: ${isSelected ? '#ffffff' : '#e8dfc8'};
              font-weight: ${isSelected ? '500' : '400'};
              box-shadow: ${isSelected ? '0 0 16px rgba(201,168,76,0.18), inset 0 0 12px rgba(201,168,76,0.06)' : 'none'};
              cursor: pointer;
            "
          >
            <div class="circle-indicator" style="
              width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
              display: flex; align-items: center; justify-content: center;
              border: ${isSelected ? '1.5px solid #c9a84c' : '1.5px solid rgba(201,168,76,0.3)'};
              background: ${isSelected ? 'rgba(201,168,76,0.2)' : 'transparent'};
              transition: all 0.2s;
              box-shadow: ${isSelected ? '0 0 8px rgba(201,168,76,0.5)' : 'none'};
            ">
              ${isSelected ? `
                <div style="
                  width: 9px; height: 9px; border-radius: 50%;
                  background: #c9a84c;
                  box-shadow: 0 0 6px #c9a84c;
                "></div>
              ` : ''}
            </div>
            <span class="text-sm tracking-wide">${opt.lbl}</span>
          </button>
        `;
      });

      const container = document.getElementById('app-content');
      container.innerHTML = `
        <div class="px-4 animate-fade-in">
          <div class="mb-8">
            <div class="flex justify-between items-end mb-3">
              <div class="flex flex-col">
                <span class="text-xs uppercase tracking-widest text-mvGold font-bold">
                  Step ${state.step + 1} of ${QUESTIONS.length}
                </span>
                <span class="text-lg font-bold text-mvText mt-1">${q.lbl}</span>
              </div>
              <span class="text-xs text-mvDim tracking-wider font-mono">${progressPercent}% Completed</span>
            </div>
            <div class="h-[2px] w-full bg-white/5 rounded-full overflow-hidden">
              <div
                class="h-full bg-gradient-to-r from-mvGold/50 to-mvGold rounded-full transition-all duration-500 ease-out shadow-[0_0_6px_#c9a84c]"
                style="width: ${progressPercent}%"
              ></div>
            </div>
          </div>

          <div
            class="rounded-2xl border border-mvGold/15 p-6 md:p-8 mb-8 backdrop-blur-md transition-all duration-300 hover:border-mvGold/30"
            style="background-color: rgba(11, 11, 28, 0.88); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);"
          >
            <h2 class="text-xl md:text-2xl font-bold text-mvText leading-snug mb-2">
              ${q.txt}
            </h2>
            ${q.sub ? `
              <p class="text-xs text-mvTextSub mb-6 flex items-center gap-1.5 font-medium">
                <span class="inline-block w-1 h-1 rounded-full bg-mvGold"></span> ${q.sub}
              </p>
            ` : `
              <div class="h-6"></div>
            `}

            <div class="space-y-3 flex flex-col gap-3">
              ${optionsHtml}
            </div>
          </div>

          <div class="flex justify-between items-center gap-4">
            <button
              onclick="prevStep()"
              ${state.step === 0 ? 'disabled' : ''}
              class="px-6 py-3 rounded-full border border-mvGold/30 text-xs md:text-sm tracking-wider transition-all duration-300 ${
                state.step === 0
                  ? 'opacity-20 cursor-default'
                  : 'text-mvTextSub hover:bg-white/5 hover:text-mvText hover:border-[#c9a84c]/60 font-semibold'
              }"
            >
              ← 戻る
            </button>

            <span id="selected-count-label" class="text-xs text-mvDim tracking-wider font-semibold hidden sm:inline">
              ${selectedOptions.length > 0 ? `${selectedOptions.length}個選択中` : '選択してください'}
            </span>

            <button
              id="next-step-btn"
              onclick="nextStep()"
              ${isNextButtonValid ? '' : 'disabled'}
              class="px-8 py-3 rounded-full text-xs md:text-sm tracking-widest font-bold transition-all duration-300 ${
                isNextButtonValid
                  ? 'bg-[#c9a84c] text-[#050510] hover:bg-[#dfbd5b] shadow-[0_4px_15px_rgba(201,168,76,0.3)] hover:scale-105 active:scale-95 cursor-pointer'
                  : 'bg-white/5 text-[#b8af9a] border border-white/10 cursor-default'
              }"
            >
              ${isLastStep ? '運命のマッチングへ' : '次へ進む →'}
            </button>
          </div>

          <div class="text-center mt-6">
            <button
              onclick="retry()"
              class="bg-none border-none cursor-pointer text-[11px] text-white/90 tracking-widest underline underline-offset-4 hover:text-white font-medium"
            >
              最初からやり直す
            </button>
          </div>
        </div>
      `;
    }

    function renderMatching() {
      const messages = [
        'あなたの周波数・エネルギー波形を解析中...',
        '宇宙情報にアクセス中...',
        '高次元ワールドとの適合モデルを算出中...'
      ];
      let index = 0;

      const container = document.getElementById('app-content');
      container.innerHTML = `
        <div class="text-center py-20 px-4 flex flex-col items-center justify-center animate-fade-in">
          <div class="w-32 h-32 mb-8 animate-[flowerBounce_1.6s_ease-in-out_infinite] drop-shadow-[0_4px_12px_rgba(201,168,76,0.25)]">
            <img
              src="solaco_all world.png"
              alt="Maaya Village Flower"
              class="w-full h-full object-contain"
            />
          </div>

          <div class="space-y-4 max-w-sm">
            <p id="matching-msg" class="text-lg font-medium text-[#ffffff] tracking-wider transition-all duration-300">
              ${messages[0]}
            </p>
            <div class="w-32 h-[1px] bg-gradient-to-r from-transparent via-[#c9a84c]/60 to-transparent mx-auto"></div>
            <p class="text-xs text-mvDim tracking-widest uppercase font-bold">Connecting with Cosmos</p>
          </div>
        </div>
      `;

      matchInterval = setInterval(() => {
        index = (index + 1) % messages.length;
        const msgEl = document.getElementById('matching-msg');
        if (msgEl) msgEl.innerText = messages[index];
      }, 600);
    }

    function renderResults() {
      if (matchInterval) {
        clearInterval(matchInterval);
        matchInterval = null;
      }
      if (!state.results) return;

      const hasSeminar = (state.answers.style || []).includes('seminar');
      const recommendations = (state.results.recommendations || [])
        .map(rec => ({ ...rec, product: PRODUCTS.find(p => p.id === rec.id) }))
        .filter(rec => rec.product);

      let recsHtml = '';
      recommendations.forEach((rec, idx) => {
        recsHtml += `
          <div
            class="rounded-2xl border border-[#c9a84c]/15 hover:border-[#c9a84c]/30 p-6 transition-all duration-300 transform hover:scale-[1.01] hover:shadow-[0_8px_24px_rgba(0,0,0,0.5)]"
            style="background-color: ${C.card}"
          >
            <div class="flex flex-col sm:flex-row sm:items-start justify-between gap-4 mb-4">
              <div class="space-y-2">
                <div class="flex flex-wrap items-center gap-2">
                  <span class="text-[10px] md:text-xs font-bold px-3 py-1 rounded-full border border-[#c9a84c]/40 text-[#c9a84c] bg-[#c9a84c]/10 tracking-wider">
                    推奨度 ${idx + 1}
                  </span>
                  <span class="text-xs text-mvDim tracking-wider font-semibold">${rec.product.cat}</span>
                </div>
                <h3 class="text-lg md:text-xl font-bold text-[#ffffff] leading-snug">
                  ${rec.product.name}
                </h3>
              </div>
              <div class="text-left sm:text-right shrink-0">
                <p class="text-lg md:text-xl font-bold text-mvGold tracking-wide">
                  ${rec.product.priceLabel || (rec.product.price ? `¥${rec.product.price.toLocaleString()}` : '要問い合わせ')}
                </p>
                <span class="text-[10px] text-mvTextSub block mt-0.5 font-medium">※税込価格</span>
              </div>
            </div>

            <div class="border-t border-mvGold/10 pt-4 mb-6">
              <p class="text-sm text-mvTextSub leading-relaxed font-normal">
                ${rec.reason}
              </p>
            </div>

            <div class="flex flex-wrap gap-3">
              <a
                href="${rec.product.url}"
                target="_blank"
                rel="noopener noreferrer"
                class="inline-flex items-center justify-center px-6 py-2.5 rounded-full border border-mvGold/50 hover:border-mvGold text-[#ffffff] bg-mvGold/10 hover:bg-mvGold/20 text-xs md:text-sm tracking-wider font-bold transition-all duration-300 shadow-[0_2px_8px_rgba(0,0,0,0.2)]"
              >
                商品詳細ページへ →
              </a>
            </div>
          </div>
        `;
      });

      const container = document.getElementById('app-content');
      container.innerHTML = `
        <div class="px-4 pb-16 animate-fade-in">
          <div class="text-center mb-10">
            <div class="flex justify-center items-center gap-3 mb-4">
              <div class="h-[1px] w-8 bg-mvGold/40"></div>
              <span class="text-xs uppercase tracking-[0.4em] text-mvGold font-bold">Your Result</span>
              <div class="h-[1px] w-8 bg-mvGold/40"></div>
            </div>
            <h2 class="text-2xl md:text-3xl font-medium text-mvText mb-6">あなたを導く波動調整プラン</h2>

            ${state.results.overall_message ? `
              <div
                class="rounded-2xl border border-mvGold/20 p-5 md:p-6 backdrop-blur-md max-w-2xl mx-auto"
                style="
                  background: linear-gradient(135deg, rgba(201,168,76,0.12) 0%, rgba(201,168,76,0.04) 100%);
                  box-shadow: inset 0 0 15px rgba(201,168,76,0.05)
                "
              >
                <p class="text-sm md:text-base text-[#ffffff] leading-relaxed font-semibold italic">
                  「${state.results.overall_message}」
                </p>
              </div>
            ` : ''}
          </div>

          <div class="space-y-6 max-w-2xl mx-auto mb-12 flex flex-col gap-6">
            ${recsHtml}
          </div>

          <div class="text-center pt-8 border-t border-mvGold/10 max-w-2xl mx-auto">
            <!-- LINE登録CTA（常時表示・セミナー選択時は強調） -->
            <div style="
              margin-bottom: 24px; padding: 20px 24px; border-radius: 14px;
              background: ${hasSeminar ? 'rgba(6,199,85,0.12)' : 'rgba(6,199,85,0.07)'};
              border: ${hasSeminar ? '1px solid rgba(6,199,85,0.45)' : '1px solid rgba(6,199,85,0.22)'};
            ">
              ${hasSeminar ? `
                <p style="font-size: 13px; color: #a4f5be; margin-bottom: 12px; line-height: 1.9; font-weight: 500;">
                  セミナー・イベントへのご参加をご希望の方は<br />
                  公式LINEにご登録ください。<br />
                  <span style="font-size: 12px; opacity: 0.9">開催情報をいち早くお届けします✨</span>
                </p>
              ` : `
                <p style="font-size: 12px; color: #a4f5be; margin-bottom: 12px; line-height: 1.9; font-weight: 500;">
                  セミナー・イベントの開催情報やMV最新情報は<br />
                  公式LINEでいち早くお届けしています
                </p>
              `}
              <a
                href="https://line.me/R/ti/p/@250fmmgh"
                target="_blank"
                rel="noopener noreferrer"
                style="
                  display: inline-block; padding: 10px 32px; border-radius: 25px;
                  background: #06c755; color: #fff; text-decoration: none;
                  font-size: 14px; font-weight: bold;
                  box-shadow: 0 4px 14px rgba(6,199,85,0.35);
                "
              >
                公式LINEに登録する
              </a>
            </div>

            <button
              onclick="retry()"
              class="px-8 py-3 rounded-full border border-mvGold/30 hover:border-mvGold text-mvTextSub hover:text-mvText hover:bg-white/5 text-xs md:text-sm tracking-widest font-bold transition-all duration-300 cursor-pointer"
            >
              最初からもう一度診断する
            </button>
          </div>
        </div>
      `;
    }

    function render() {
      if (state.screen === 'welcome') {
        renderWelcome();
      } else if (state.screen === 'quiz') {
        renderQuiz();
      } else if (state.screen === 'matching') {
        renderMatching();
      } else if (state.screen === 'results') {
        renderResults();
      }
    }

    // 初期起動
    window.onload = function() {
      generateSparkles();
      render();
    }
  </script>
</body>
</html>
